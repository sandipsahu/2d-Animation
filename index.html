<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ScriptForge — AI Prompt Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0a08;
    --bg-2: #13110d;
    --panel: #181510;
    --panel-2: #1f1b14;
    --border: #2a241a;
    --border-hot: #3d3322;
    --ink: #f4ead5;
    --ink-dim: #a89a78;
    --ink-faint: #6b6048;
    --accent: #e8a33d;
    --accent-2: #ff6b3d;
    --danger: #c94a3a;
    --ok: #6ba368;
    --radius: 6px;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top left, rgba(232,163,61,0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255,107,61,0.05), transparent 50%);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.55;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  button, input, textarea, select {
    font-family: inherit;
    color: inherit;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hot); }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ========== SIDEBAR ========== */
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.5px;
    font-style: italic;
  }
  .brand h1 span { color: var(--accent); }
  .brand p {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .projects-head {
    padding: 16px 22px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .projects-head span {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
  }
  .btn-new {
    background: var(--accent);
    color: #1a1408;
    border: none;
    border-radius: 4px;
    width: 22px;
    height: 22px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
  }
  .btn-new:hover { transform: scale(1.1); background: #f5b84a; }

  .projects-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 12px 12px;
  }
  .project-item {
    padding: 12px 14px;
    margin: 3px 0;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .project-item:hover {
    background: var(--panel);
    border-color: var(--border);
  }
  .project-item.active {
    background: var(--panel-2);
    border-color: var(--accent);
  }
  .project-item .name {
    flex: 1;
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-item.active .name { color: var(--accent); }
  .project-item .del {
    background: transparent;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 14px;
    padding: 2px 6px;
  }
  .project-item:hover .del { opacity: 1; }
  .project-item .del:hover { color: var(--danger); }

  .sidebar-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
  }
  .api-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-faint);
    cursor: pointer;
  }
  .api-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--danger);
  }
  .api-dot.ok { background: var(--ok); }
  .api-status:hover { color: var(--ink); }

  /* ========== MAIN ========== */
  .main {
    overflow-y: auto;
    padding: 40px 56px 80px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: var(--ink-dim);
  }
  .empty-state h2 {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .empty-state h2 em { color: var(--accent); font-style: italic; }
  .empty-state p { max-width: 440px; line-height: 1.7; }
  .empty-state button {
    margin-top: 28px;
    background: var(--accent);
    color: #1a1408;
    border: none;
    padding: 12px 28px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .empty-state button:hover { transform: translateY(-2px); }

  .workspace { max-width: 960px; margin: 0 auto; }

  .ws-header { margin-bottom: 32px; }
  .ws-header .label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .ws-header h2 {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: -0.5px;
    line-height: 1.1;
    outline: none;
    border: none;
    background: transparent;
    width: 100%;
    padding: 0;
  }
  .ws-header h2:focus { color: var(--accent); }

  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .section-head {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-head h3 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 500;
  }
  .section-head .hint {
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
  }
  .section-body { padding: 20px 22px; }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea.master { min-height: 200px; }
  textarea.script { min-height: 180px; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 14px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
  }
  .field input, .field select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }

  .action-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 24px;
  }
  .btn-primary {
    background: var(--accent);
    color: #1a1408;
    border: none;
    padding: 14px 32px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,163,61,0.25);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--border);
    padding: 13px 22px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  .save-ind {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ok);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-ind.show { opacity: 1; }

  /* ========== RESULTS ========== */
  .results { margin-top: 40px; }
  .results-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .results-head h3 {
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    font-weight: 500;
  }
  .results-head .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .scene {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 18px;
    overflow: hidden;
  }
  .scene-head {
    padding: 14px 20px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .scene-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    color: var(--accent);
    font-weight: 500;
  }
  .scene-title {
    font-family: var(--serif);
    font-size: 16px;
    font-style: italic;
    color: var(--ink);
    flex: 1;
  }
  .scene-body { padding: 0; }

  .prompt-block {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .prompt-block:last-child { border-bottom: none; }
  .prompt-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .prompt-label span {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
  }
  .prompt-label .type-script { color: var(--ink-dim); }
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink-faint);
    padding: 4px 10px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .copy-btn.copied {
    border-color: var(--ok);
    color: var(--ok);
  }
  .prompt-text {
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.75;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .prompt-text.script-text {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink-dim);
    font-style: italic;
  }

  /* ========== LOADING ========== */
  .loading {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--ink-dim);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(201,74,58,0.1);
    border: 1px solid var(--danger);
    color: #f0a99c;
    padding: 14px 18px;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 12px;
    margin-top: 18px;
  }

  /* ========== MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border-hot);
    border-radius: var(--radius);
    padding: 32px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h3 {
    font-family: var(--serif);
    font-style: italic;
    font-size: 26px;
    margin-bottom: 8px;
  }
  .modal p {
    color: var(--ink-dim);
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .modal p a { color: var(--accent); }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1>Script<span>Forge</span></h1>
      <p>AI Prompt Studio</p>
    </div>
    <div class="projects-head">
      <span>Projects</span>
      <button class="btn-new" id="btnNew" title="New Project">+</button>
    </div>
    <div class="projects-list" id="projectsList"></div>
    <div class="sidebar-footer">
      <div class="api-status" id="apiStatus">
        <div class="api-dot" id="apiDot"></div>
        <span id="apiText">Set Gemini API Key</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main"></main>
</div>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <h3>Gemini API Key</h3>
    <p>
      Get your <strong>free</strong> API key from
      <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>.
      Key is saved only in your browser — never sent anywhere except Google's API.
    </p>
    <input type="password" id="apiKeyInput" placeholder="AIza..." />
    <div class="modal-actions">
      <button class="btn-secondary" id="apiCancel">Cancel</button>
      <button class="btn-primary" id="apiSave">Save</button>
    </div>
  </div>
</div>

<script>
// ============ STATE ============
const LS_PROJECTS = 'scriptforge_projects_v1';
const LS_APIKEY = 'scriptforge_apikey_v1';
const LS_ACTIVE = 'scriptforge_active_v1';

let state = {
  projects: JSON.parse(localStorage.getItem(LS_PROJECTS) || '[]'),
  activeId: localStorage.getItem(LS_ACTIVE) || null,
  apiKey: localStorage.getItem(LS_APIKEY) || '',
};

function saveProjects() {
  localStorage.setItem(LS_PROJECTS, JSON.stringify(state.projects));
}
function setActive(id) {
  state.activeId = id;
  localStorage.setItem(LS_ACTIVE, id || '');
}
function getActive() {
  return state.projects.find(p => p.id === state.activeId);
}
function uid() {
  return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

// ============ PROJECT OPS ============
function createProject() {
  const p = {
    id: uid(),
    name: 'Untitled Project',
    masterPrompt: '',
    script: '',
    imageStyle: 'cinematic',
    aspectRatio: '16:9',
    scenes: [],
    createdAt: Date.now(),
  };
  state.projects.unshift(p);
  setActive(p.id);
  saveProjects();
  render();
}
function deleteProject(id) {
  if (!confirm('Delete this project? This cannot be undone.')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.activeId === id) {
    setActive(state.projects[0]?.id || null);
  }
  saveProjects();
  render();
}
function updateActive(patch) {
  const p = getActive();
  if (!p) return;
  Object.assign(p, patch);
  saveProjects();
}

// ============ GEMINI API ============
async function callGemini(prompt) {
  if (!state.apiKey) throw new Error('API key not set');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.8,
        maxOutputTokens: 8192,
        responseMimeType: 'application/json',
      },
    }),
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API error ${res.status}: ${err}`);
  }
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text;
}

async function generateScenes() {
  const p = getActive();
  if (!p) return;
  if (!state.apiKey) { openApiModal(); return; }
  if (!p.script.trim()) { alert('Please paste your script first.'); return; }
  if (!p.masterPrompt.trim()) { alert('Please set a master prompt first.'); return; }

  const btn = document.getElementById('btnGenerate');
  const status = document.getElementById('genStatus');
  btn.disabled = true;
  status.innerHTML = '<div class="loading"><div class="spinner"></div><span>Forging scenes…</span></div>';
  document.getElementById('errorBox')?.remove();

  const metaPrompt = `You are a professional AI prompt engineer. You will break a script into scenes and generate image + video prompts for each scene.

=== USER'S MASTER STYLE GUIDE ===
${p.masterPrompt}
=== END STYLE GUIDE ===

=== SCRIPT ===
${p.script}
=== END SCRIPT ===

TASK:
1. Divide the script into logical scenes (one sentence or one beat per scene).
2. For EACH scene, produce:
   - "script_line": the original script text for this scene (verbatim from the script)
   - "scene_title": a short 3-6 word title
   - "image_prompt": a detailed image generation prompt in the EXACT style described in the master style guide above. Include subject, composition, lighting, mood, camera angle, color palette, and style keywords. Aspect ratio: ${p.aspectRatio}. Style hint: ${p.imageStyle}.
   - "veo3_prompt": a detailed Google Veo 3 video prompt for this scene. Include: subject + action, camera movement (e.g., slow dolly in, tracking shot, static), duration feel, lighting, ambient sound / audio description (Veo 3 supports native audio), and style keywords matching the master style guide. Keep consistent with the image prompt.

OUTPUT STRICT JSON ONLY in this exact shape:
{
  "scenes": [
    {
      "script_line": "...",
      "scene_title": "...",
      "image_prompt": "...",
      "veo3_prompt": "..."
    }
  ]
}

No markdown, no commentary. JSON only.`;

  try {
    const raw = await callGemini(metaPrompt);
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch {
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Could not parse response as JSON');
      parsed = JSON.parse(match[0]);
    }
    if (!parsed.scenes || !Array.isArray(parsed.scenes)) {
      throw new Error('Response missing scenes array');
    }
    updateActive({ scenes: parsed.scenes });
    status.innerHTML = '';
    render();
  } catch (e) {
    status.innerHTML = '';
    const err = document.createElement('div');
    err.className = 'error-box';
    err.id = 'errorBox';
    err.textContent = 'Error: ' + e.message;
    document.querySelector('.action-bar')?.after(err);
  } finally {
    btn.disabled = false;
  }
}

// ============ RENDER ============
function render() {
  renderSidebar();
  renderMain();
  renderApiStatus();
}

function renderSidebar() {
  const list = document.getElementById('projectsList');
  if (state.projects.length === 0) {
    list.innerHTML = '<div style="padding:20px 14px;font-size:12px;color:var(--ink-faint);font-style:italic;">No projects yet. Click + to create one.</div>';
    return;
  }
  list.innerHTML = state.projects.map(p => `
    <div class="project-item ${p.id === state.activeId ? 'active' : ''}" data-id="${p.id}">
      <div class="name">${escapeHtml(p.name)}</div>
      <button class="del" data-del="${p.id}" title="Delete">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.project-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.dataset.del) {
        deleteProject(e.target.dataset.del);
      } else {
        setActive(el.dataset.id);
        render();
      }
    });
  });
}

function renderApiStatus() {
  const dot = document.getElementById('apiDot');
  const text = document.getElementById('apiText');
  if (state.apiKey) {
    dot.classList.add('ok');
    text.textContent = 'API Connected';
  } else {
    dot.classList.remove('ok');
    text.textContent = 'Set Gemini API Key';
  }
}

function renderMain() {
  const main = document.getElementById('main');
  const p = getActive();

  if (!p) {
    main.innerHTML = `
      <div class="empty-state">
        <h2>Welcome to <em>ScriptForge</em></h2>
        <p>Create a project, set your master prompt once, then paste any script — ScriptForge breaks it into scenes with image &amp; Veo 3 video prompts, all in your chosen style.</p>
        <button onclick="createProject()">+ Create First Project</button>
      </div>
    `;
    return;
  }

  main.innerHTML = `
    <div class="workspace">
      <div class="ws-header">
        <div class="label">Project</div>
        <input type="text" id="projName" value="${escapeAttr(p.name)}" class="name-input" />
      </div>

      <div class="section">
        <div class="section-head">
          <h3>Master Prompt</h3>
          <span class="hint">Your style DNA — set once, used every time</span>
        </div>
        <div class="section-body">
          <textarea id="masterPrompt" class="master" placeholder="e.g. Style: ultra-realistic cinematic, 35mm film grain, moody warm-dark lighting, shallow depth of field, color palette of amber and teal. Characters: consistent across scenes. Camera: slow deliberate movements, wide establishing shots followed by close-ups...">${escapeHtml(p.masterPrompt)}</textarea>
          <div class="field-row">
            <div class="field">
              <label>Visual Style Hint</label>
              <select id="imageStyle">
                ${['cinematic','3d animation','2d animation','anime','realistic','hyperrealistic','oil painting','watercolor','comic book','pixar style','historical','documentary','fantasy','horror'].map(s => `<option value="${s}" ${p.imageStyle===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Aspect Ratio</label>
              <select id="aspectRatio">
                ${['16:9','9:16','1:1','4:3','21:9'].map(a => `<option value="${a}" ${p.aspectRatio===a?'selected':''}>${a}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <h3>Script</h3>
          <span class="hint">Paste your full script or story</span>
        </div>
        <div class="section-body">
          <textarea id="script" class="script" placeholder="Paste your script here. ScriptForge will automatically divide it into scenes and generate prompts for each...">${escapeHtml(p.script)}</textarea>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn-primary" id="btnGenerate">⚡ Generate Prompts</button>
        <span class="save-ind" id="saveInd">✓ Saved</span>
        <div id="genStatus" style="margin-left:auto;"></div>
      </div>

      ${p.scenes && p.scenes.length ? renderScenes(p.scenes) : ''}
    </div>
  `;

  // bind inputs
  const debouncedSave = debounce(() => {
    showSaved();
  }, 400);

  document.getElementById('projName').addEventListener('input', (e) => {
    updateActive({ name: e.target.value || 'Untitled Project' });
    renderSidebar();
    debouncedSave();
  });
  document.getElementById('masterPrompt').addEventListener('input', (e) => {
    updateActive({ masterPrompt: e.target.value });
    debouncedSave();
  });
  document.getElementById('script').addEventListener('input', (e) => {
    updateActive({ script: e.target.value });
    debouncedSave();
  });
  document.getElementById('imageStyle').addEventListener('change', (e) => {
    updateActive({ imageStyle: e.target.value });
    debouncedSave();
  });
  document.getElementById('aspectRatio').addEventListener('change', (e) => {
    updateActive({ aspectRatio: e.target.value });
    debouncedSave();
  });
  document.getElementById('btnGenerate').addEventListener('click', generateScenes);

  // copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.closest('.prompt-block').querySelector('.prompt-text').textContent;
      navigator.clipboard.writeText(text);
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    });
  });

  // style the name input
  const nameInput = document.getElementById('projName');
  nameInput.style.cssText = 'font-family:var(--serif);font-size:42px;font-weight:500;font-style:italic;letter-spacing:-0.5px;line-height:1.1;outline:none;border:none;background:transparent;width:100%;padding:0;color:var(--ink);';
  nameInput.addEventListener('focus', () => nameInput.style.color = 'var(--accent)');
  nameInput.addEventListener('blur', () => nameInput.style.color = 'var(--ink)');
}

function renderScenes(scenes) {
  return `
    <div class="results">
      <div class="results-head">
        <h3>Generated Scenes</h3>
        <span class="count">${scenes.length} scenes</span>
      </div>
      ${scenes.map((s, i) => `
        <div class="scene">
          <div class="scene-head">
            <span class="scene-num">${String(i+1).padStart(2,'0')}</span>
            <span class="scene-title">${escapeHtml(s.scene_title || 'Scene ' + (i+1))}</span>
          </div>
          <div class="scene-body">
            <div class="prompt-block">
              <div class="prompt-label"><span class="type-script">Script</span></div>
              <div class="prompt-text script-text">${escapeHtml(s.script_line || '')}</div>
            </div>
            <div class="prompt-block">
              <div class="prompt-label">
                <span>Image Prompt</span>
                <button class="copy-btn">Copy</button>
              </div>
              <div class="prompt-text">${escapeHtml(s.image_prompt || '')}</div>
            </div>
            <div class="prompt-block">
              <div class="prompt-label">
                <span>Veo 3 Video Prompt</span>
                <button class="copy-btn">Copy</button>
              </div>
              <div class="prompt-text">${escapeHtml(s.veo3_prompt || '')}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ============ UTILS ============
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function debounce(fn, ms) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}
function showSaved() {
  const el = document.getElementById('saveInd');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

// ============ MODAL ============
function openApiModal() {
  document.getElementById('apiKeyInput').value = state.apiKey || '';
  document.getElementById('apiModal').classList.add('show');
}
function closeApiModal() {
  document.getElementById('apiModal').classList.remove('show');
}
document.getElementById('apiStatus').addEventListener('click', openApiModal);
document.getElementById('apiCancel').addEventListener('click', closeApiModal);
document.getElementById('apiSave').addEventListener('click', () => {
  const val = document.getElementById('apiKeyInput').value.trim();
  state.apiKey = val;
  localStorage.setItem(LS_APIKEY, val);
  closeApiModal();
  renderApiStatus();
});
document.getElementById('btnNew').addEventListener('click', createProject);

// init
render();
</script>
</body>
</html>
